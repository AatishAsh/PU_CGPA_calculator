<!DOCTYPE html>
<html>
<head>

<title>PU Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0f172a;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    width:350px;
    background:#1e293b;
    color:white;
    border-radius:15px;
    padding:30px;
}

</style>

</head>

<body>

<div class="login-card">

<h2 class="text-center mb-4">
PU CSE Portal
</h2>

<form method="POST">

<input
    type="text"
    name="username"
    class="form-control mb-3"
    placeholder="Username"
    required
>

<input
    type="text"
    name="regno"
    class="form-control mb-3"
    placeholder="23TD00XX"
>

<input
    type="password"
    name="password"
    class="form-control mb-3"
    placeholder="Password"
    required
>

<button
    name="action"
    value="login"
    class="btn btn-success w-100 mb-2"
>
Login
</button>

<button
    name="action"
    value="register"
    class="btn btn-primary w-100"
>
Register
</button>

</form>

</div>

</body>
</html>
