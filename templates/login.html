<!DOCTYPE html>
<html>
<head>
    <title>PU CGPA Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #0f172a; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card { 
            width: 380px; 
            background: #1e293b; 
            color: white; 
            border-radius: 15px; 
            padding: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .toggle-link {
            color: #38bdf8;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .toggle-link:hover {
            text-decoration: underline;
        }
        .form-control, .form-select {
            background: #334155;
            border: 1px solid #475569;
            color: white;
        }
        .form-control:focus, .form-select:focus {
            background: #334155;
            border-color: #38bdf8;
            color: white;
            box-shadow: none;
        }
        .form-control::placeholder {
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container" style="max-width: 400px;">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
</div>

<div class="login-card">
    <h2 class="text-center mb-4">PU CGPA Portal</h2>
    
    <!-- REGISTRATION FORM (Default) -->
    <div id="registerSection">
        <h5 class="mb-3 text-secondary">Create Account</h5>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="action" value="register">
            <input type="text" name="username" class="form-control mb-3" placeholder="Full Name" required>
            <input type="text" name="regno" class="form-control mb-3" placeholder="Registration Number (e.g. 23TD...)" required>
            <select name="department" class="form-select mb-3">
                <option value="CSE">CSE (Computer Science)</option>
                <option value="IT">IT (Information Technology)</option>
            </select>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100 mb-3">Register</button>
        </form>
        <p class="text-center mb-0">
            Already have an account? <span class="toggle-link" onclick="toggleForms()">Login</span>
        </p>
    </div>

    <!-- LOGIN FORM (Hidden by default) -->
    <div id="loginSection" style="display: none;">
        <h5 class="mb-3 text-secondary">Welcome Back</h5>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="action" value="login">
            <input type="text" name="regno" class="form-control mb-3" placeholder="Registration Number" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
            <button type="submit" class="btn btn-success w-100 mb-3">Login</button>
        </form>
        <p class="text-center mb-0">
            Don't have an account? <span class="toggle-link" onclick="toggleForms()">Register</span>
        </p>
    </div>
</div>

<script>
    function toggleForms() {
        const regSec = document.getElementById('registerSection');
        const loginSec = document.getElementById('loginSection');
        
        if (regSec.style.display === 'none') {
            regSec.style.display = 'block';
            loginSec.style.display = 'none';
        } else {
            regSec.style.display = 'none';
            loginSec.style.display = 'block';
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
