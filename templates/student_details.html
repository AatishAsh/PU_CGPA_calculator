<!DOCTYPE html>
<html>
<head>

<title>Student Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#111827;
    color:white;
}

.card-dark{
    background:#1f2937;
    border-radius:15px;
    padding:25px;
}

</style>

</head>

<body>

<div class="container mt-4">

<h2>
{{username}}
</h2>

<p class="text-secondary">
{{user.register_number}}
</p>

<p>
CGPA : {{user.cgpa}}
</p>

{% for sem, data in user.gradesData.items() %}

<div class="card-dark mt-4">

<h4>
Semester {{sem}}
</h4>

<table class="table table-dark table-bordered mt-3">

<tr>
<th>Subject</th>
<th>Grade</th>
<th>Credit</th>
</tr>

{% for s in data.subjects %}

<tr>
<td>{{s.subject}}</td>
<td>{{s.grade}}</td>
<td>{{s.credit}}</td>
</tr>

{% endfor %}

<tr>
<th colspan="2">SGPA</th>
<th>{{data.sgpa}}</th>
</tr>

</table>

</div>

{% endfor %}

<div class="mt-4">

<a href="/admin" class="btn btn-primary">
Back
</a>

</div>

</div>

</body>
</html>
